<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Resume — Xing Liu</title>
<meta name="description" content="Portfolio of Xing Liu, a senior product designer + builder. Eight years across fintech, infra, and data tools.">
<meta property="og:title" content="Xing Liu — Senior Product Designer & Builder">
<meta property="og:description" content="Eight years across fintech, infra, and data tools. Open to senior IC roles where craft is the bar.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#f7f6f3">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg, #f7f6f3);
    color: var(--ink, #0a0a0a);
    transition: background .4s ease, color .4s ease;
  }
  ::selection { background: var(--accent, #4caf50); color: #fff; }

  a, button { transition: color .15s ease, background .15s ease, opacity .15s ease, transform .15s ease; }
  .work-card { transition: transform .35s cubic-bezier(.2,.7,.3,1), box-shadow .35s ease; }
  .work-card:hover { transform: translateY(-3px); box-shadow: 0 18px 40px rgba(10,10,10,0.08); }
  .work-card:hover .read-btn { transform: translateX(4px); }
  .nav-link { position: relative; }
  .nav-link::after {
    content: ''; position: absolute; left: 20px; right: 20px; bottom: 6px;
    height: 1px; background: currentColor; transform: scaleX(0); transform-origin: left;
    transition: transform .25s ease;
  }
  .nav-link:hover::after { transform: scaleX(1); }
  .nav-link.is-active::after { transform: scaleX(1); }
  .reveal { opacity: 0; transform: translateY(14px); transition: opacity .7s ease, transform .7s cubic-bezier(.2,.7,.3,1); }
  .reveal.is-in { opacity: 1; transform: none; }

  .page-container { max-width: 1280px; margin: 0 auto; }
  @media (max-width: 900px) {
    .responsive-grid { grid-template-columns: 1fr !important; }
    .responsive-hero { grid-template-columns: 1fr !important; }
    .responsive-hide { display: none !important; }
    .hero-h1 { font-size: 64px !important; }
    .section-h2 { font-size: 36px !important; }
  }

  /* Splash while Babel/JSX compiles on first paint */
  .splash {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #f7f6f3; z-index: 9999;
    font-family: 'DM Sans', system-ui, sans-serif; color: #6b6b6b;
    transition: opacity .4s ease;
  }
  .splash.hide { opacity: 0; pointer-events: none; }
  .splash-dot { width: 12px; height: 12px; border-radius: 50%; background: #4caf50; margin-right: 12px;
    animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1 } 50% { transform: scale(.6); opacity: .5 } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<script>window.PAGE = 'resume';</script>
<div class="splash" id="splash"><span class="splash-dot"></span>Loading…</div>
<div id="root"></div>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="portfolio-final.jsx"></script>
<script type="text/babel">
  // Hide splash once React has mounted
  setTimeout(() => {
    const s = document.getElementById('splash');
    if (s) { s.classList.add('hide'); setTimeout(() => s.remove(), 400); }
  }, 200);
</script>
</body>
</html>
